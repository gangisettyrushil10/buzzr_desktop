      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="72%" cy="76%" r="36%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
