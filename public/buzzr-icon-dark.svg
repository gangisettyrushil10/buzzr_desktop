    <line x1="96" y1="49.5" x2="140" y2="49.5" stroke="#A7F3D0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <line x1="172" y1="49.5" x2="330" y2="49.5" stroke="#A7F3D0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <line x1="172" y1="199.5" x2="330" y2="199.5" stroke="#A7F3D0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <line x1="172" y1="341.5" x2="330" y2="341.5" stroke="#A7F3D0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <line x1="342" y1="109.5" x2="386" y2="109.5" stroke="#A7F3D0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <line x1="342" y1="259.5" x2="386" y2="259.5" stroke="#A7F3D0" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <!-- Edge strokes -->
