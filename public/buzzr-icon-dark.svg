  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#field)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow1)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow2)"/>
  <rect width="512" height="512" rx="112" fill="url(#neon)"/>
  <rect width="512" height="512" rx="112" fill="url(#vig)"/>
  <g transform="translate(256,256) skewX(-5) translate(-238,-224)">
