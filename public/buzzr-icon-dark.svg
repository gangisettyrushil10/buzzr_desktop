<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#142234"/>
      <stop offset="50%" stop-color="#101B28"/>
      <stop offset="100%" stop-color="#0C1620"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="25%" stop-color="#4ADE9E"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="75%" stop-color="#22C78A"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Sharp top highlight - harder cutoff for glass -->
    <linearGradient id="hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1FAE5" stop-opacity="0.60"/>
      <stop offset="30%" stop-color="#A7F3D0" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#6EE7B7" stop-opacity="0"/>
    </linearGradient>
    <!-- Bottom shadow for glass bevel -->
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="50%" stop-color="#059669" stop-opacity="0"/>
      <stop offset="85%" stop-color="#047857" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#065F46" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="depth" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.12"/>
    </linearGradient>
    <pattern id="field" x="0" y="0" width="512" height="22" patternUnits="userSpaceOnUse">
      <rect width="512" height="11" fill="#10B981" opacity="0.05"/>
      <rect y="11" width="512" height="11" fill="#10B981" opacity="0.025"/>
    </pattern>
    <radialGradient id="neon" cx="50%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.28"/>
