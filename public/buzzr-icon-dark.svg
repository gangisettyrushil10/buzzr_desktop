    <rect x="164" y="199" width="174" height="54" rx="8" fill="url(#bevel)"/>
    <rect x="164" y="341" width="174" height="54" rx="8" fill="url(#bevel)"/>
    <rect x="334" y="109" width="60" height="83" rx="8" fill="url(#bevel)"/>
    <rect x="334" y="259" width="60" height="83" rx="8" fill="url(#bevel)"/>
