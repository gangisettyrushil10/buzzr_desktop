      <stop offset="70%" stop-color="#10B981" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow1" cx="28%" cy="24%" r="40%">
