    <rect x="164" y="49" width="174" height="14" rx="7" fill="url(#hi)"/>
    <rect x="164" y="199" width="174" height="14" rx="7" fill="url(#hi)"/>
    <rect x="164" y="341" width="174" height="14" rx="7" fill="url(#hi)"/>
    <rect x="334" y="109" width="60" height="16" rx="8" fill="url(#hi)"/>
    <rect x="334" y="259" width="60" height="16" rx="8" fill="url(#hi)"/>
