<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </radialGradient>
    <!-- Green face gradient (light to dark) -->
    <linearGradient id="greenFace" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#6de86d"/>
      <stop offset="40%" stop-color="#4dd84d"/>
      <stop offset="100%" stop-color="#2db82d"/>
    </linearGradient>
    <!-- Green dark side gradient -->
    <linearGradient id="greenSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28a028"/>
      <stop offset="100%" stop-color="#1a7a1a"/>
    </linearGradient>
    <!-- Green bottom/shadow -->
    <linearGradient id="greenBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a7a1a"/>
      <stop offset="100%" stop-color="#0e5a0e"/>
    </linearGradient>
    <!-- Highlight shine -->
    <linearGradient id="shine" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Pixel glow -->
    <filter id="pixelGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Pixel trail particles (left side) -->
  <g opacity="0.7" filter="url(#pixelGlow)">
    <!-- Column 1 -->
    <rect x="62" y="240" width="6" height="6" fill="#4dd84d" rx="1"/>
    <rect x="62" y="256" width="6" height="6" fill="#3dc83d" rx="1"/>
    <rect x="62" y="272" width="6" height="6" fill="#2db82d" rx="1"/>
    <rect x="62" y="288" width="6" height="6" fill="#1a7a1a" opacity="0.6" rx="1"/>
    <!-- Column 2 -->
    <rect x="76" y="228" width="6" height="6" fill="#4dd84d" rx="1"/>
    <rect x="76" y="244" width="6" height="6" fill="#3dc83d" rx="1"/>
    <rect x="76" y="260" width="6" height="6" fill="#2db82d" rx="1"/>
    <rect x="76" y="276" width="6" height="6" fill="#1a7a1a" rx="1"/>
    <rect x="76" y="292" width="6" height="6" fill="#0e5a0e" opacity="0.5" rx="1"/>
    <!-- Column 3 -->
    <rect x="90" y="216" width="7" height="7" fill="#5de85d" rx="1"/>
    <rect x="90" y="232" width="7" height="7" fill="#4dd84d" rx="1"/>
    <rect x="90" y="248" width="7" height="7" fill="#3dc83d" rx="1"/>
    <rect x="90" y="264" width="7" height="7" fill="#2db82d" rx="1"/>
    <rect x="90" y="280" width="7" height="7" fill="#1a7a1a" opacity="0.7" rx="1"/>
    <rect x="90" y="296" width="7" height="7" fill="#0e5a0e" opacity="0.4" rx="1"/>
    <!-- Column 4 -->
    <rect x="106" y="204" width="7" height="7" fill="#6de86d" rx="1"/>
    <rect x="106" y="220" width="7" height="7" fill="#5de85d" rx="1"/>
    <rect x="106" y="236" width="7" height="7" fill="#4dd84d" rx="1"/>
    <rect x="106" y="252" width="7" height="7" fill="#3dc83d" rx="1"/>
    <rect x="106" y="268" width="7" height="7" fill="#2db82d" rx="1"/>
    <!-- Scattered singles -->
    <rect x="50" y="260" width="5" height="5" fill="#2db82d" opacity="0.5" rx="1"/>
    <rect x="50" y="276" width="5" height="5" fill="#1a7a1a" opacity="0.3" rx="1"/>
    <rect x="120" y="196" width="6" height="6" fill="#6de86d" opacity="0.8" rx="1"/>
  </g>

  <!-- Lightning bolt "B" shape : main body -->
  <g transform="translate(130, 80)">
    <!-- Bottom shadow/3D extrusion -->
    <path d="
      M 60,340
      L 130,340
      L 190,260
      L 150,260
      L 210,170
      L 170,170
      L 230,60
      L 110,60
      L 80,130
      L 50,130
      L 20,210
      L 55,210
      L 0,340
      Z
    " fill="url(#greenBottom)" transform="translate(8, 8)"/>

    <!-- Right side (3D depth) -->
    <path d="
      M 130,340
      L 190,260
      L 198,268
      L 138,348
      Z
    " fill="#1a7a1a"/>
    <path d="
      M 150,260
      L 210,170
      L 218,178
      L 158,268
      Z
    " fill="#1a7a1a"/>
    <path d="
      M 170,170
      L 230,60
      L 238,68
      L 178,178
      Z
    " fill="#1a7a1a"/>

    <!-- Main face -->
    <path d="
      M 60,340
      L 130,340
      L 190,260
      L 150,260
      L 210,170
      L 170,170
      L 230,60
      L 110,60
      L 80,130
      L 50,130
      L 20,210
      L 55,210
      L 0,340
      Z
    " fill="url(#greenFace)"/>

    <!-- "B" letter cutouts -->
    <!-- Top hole of B -->
    <path d="
      M 120,105
      L 170,105
      L 168,115
      Q 175,115 175,125
      Q 175,140 160,142
      L 110,142
      L 120,120
      Q 115,118 115,112
      Q 115,105 120,105
      Z
    " fill="url(#bgGrad)"/>

    <!-- Bottom hole of B -->
    <path d="
      M 100,180
      L 155,180
      L 150,195
      Q 158,195 158,210
      Q 158,228 140,230
      L 80,230
      L 95,200
      Q 88,198 88,190
      Q 88,180 100,180
      Z
    " fill="url(#bgGrad)"/>

    <!-- Highlight shine on face -->
    <path d="
      M 230,60
      L 110,60
      L 80,130
      L 50,130
      L 35,170
      L 140,170
      L 170,100
      Z
    " fill="url(#shine)" opacity="0.4"/>

    <!-- Edge highlight (top) -->
    <path d="
      M 230,60
      L 110,60
      L 112,63
      L 228,63
      Z
    " fill="#90ff90" opacity="0.5"/>
  </g>

  <!-- Wings (left) -->
  <g transform="translate(115, 140)">
    <!-- Wing feathers -->
    <path d="M 0,60 Q -20,50 -55,65 Q -30,45 -5,50 Z" fill="#e8eef4"/>
    <path d="M 5,52 Q -25,38 -65,48 Q -35,30 0,40 Z" fill="#ffffff"/>
    <path d="M 10,44 Q -20,28 -60,32 Q -30,18 5,30 Z" fill="#e8eef4"/>
    <path d="M 15,36 Q -15,18 -50,18 Q -22,8 12,22 Z" fill="#ffffff"/>
    <path d="M 18,28 Q -8,12 -40,8 Q -12,0 16,14 Z" fill="#e8eef4" opacity="0.9"/>
  </g>

  <!-- Wings (right) -->
  <g transform="translate(340, 120)">
    <path d="M 20,65 Q 50,55 85,70 Q 55,48 25,55 Z" fill="#e8eef4"/>
    <path d="M 18,56 Q 55,40 95,48 Q 60,28 22,42 Z" fill="#ffffff"/>
    <path d="M 15,47 Q 50,30 90,32 Q 55,16 18,32 Z" fill="#e8eef4"/>
    <path d="M 12,38 Q 45,20 80,18 Q 48,6 14,24 Z" fill="#ffffff"/>
    <path d="M 10,30 Q 38,14 70,10 Q 42,2 12,16 Z" fill="#e8eef4" opacity="0.9"/>
  </g>

  <!-- Subtle scan lines overlay -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="512" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="512" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="512" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="512" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="512" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="512" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="512" y2="400" stroke="#fff" stroke-width="1"/>
  </g>
</svg>
